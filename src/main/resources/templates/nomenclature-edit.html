<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Редактирование товара</title>
    <style>
        body { font-family: 'Segoe UI', Helvetica, Arial, sans-serif; background-color: #f2f5f8; margin: 0; padding: 0; color: #333; font-size: 13px; }
        .navbar-ms { background-color: #2c3e50; height: 45px; display: flex; align-items: center; padding: 0 20px; color: white; }
        .form-container { background: white; margin: 20px auto; padding: 25px; border-radius: 4px; border: 1px solid #dcdfe6; max-width: 500px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
        h2 { margin-top: 0; margin-bottom: 20px; font-size: 18px; font-weight: 600; color: #1f2d3d; border-bottom: 1px solid #ebeef5; padding-bottom: 10px; }
        .form-group { display: flex; flex-direction: column; margin-bottom: 15px; }
        label { margin-bottom: 5px; font-weight: 500; color: #606266; }
        input, select { padding: 8px 12px; border: 1px solid #dcdfe6; border-radius: 3px; font-size: 13px; outline: none; }
        input:focus, select:focus { border-color: #409eff; }
        .btn-group { margin-top: 25px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #ebeef5; padding-top: 15px; }
        .btn { padding: 8px 16px; border-radius: 3px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid #dcdfe6; text-decoration: none; }
        .btn-success { background-color: #28a745; color: white; border-color: #28a745; }
        .btn-secondary { background-color: #fff; color: #606266; }
    </style>
</head>
<body>

<div class="navbar-ms">
    <a th:href="@{/}" style="font-weight: bold; font-size: 15px; margin-right: 30px; letter-spacing: 0.5px; color: white; text-decoration: none;">МойСчет</a>
</div>

<div class="form-container">
    <h2>Редактирование номенклатуры</h2>

    <form th:action="@{/nomenclatures/update}" method="POST">
        <input type="hidden" name="id" th:value="${nomenclature.id}" />

        <div class="form-group">
            <label>Наименование товара / услуги:</label>
            <input type="text" name="name" th:value="${nomenclature.name}" required />
        </div>

        <div class="form-group">
            <label>Единица измерения:</label>
            <select name="unit" required>
                <option value="шт" th:selected="${nomenclature.unit == 'шт'}">шт (Штука)</option>
                <option value="м2" th:selected="${nomenclature.unit == 'м2'}">м2 (Метр квадратный)</option>
                <option value="куб.м" th:selected="${nomenclature.unit == 'куб.м'}">куб.м (Кубический метр)</option>
                <option value="лист" th:selected="${nomenclature.unit == 'лист'}">лист (Лист)</option>
                <option value="кг" th:selected="${nomenclature.unit == 'кг'}">кг (Килограмм)</option>
                <option value="м" th:selected="${nomenclature.unit == 'м'}">м (Метр)</option>
                <option value="рулон" th:selected="${nomenclature.unit == 'рулон'}">рулон (Рулон)</option>
                <option value="упак" th:selected="${nomenclature.unit == 'упак'}">упак (Упаковка)</option>
            </select>
        </div>

        <div class="form-group">
            <label>Цена по умолчанию (с НДС):</label>
            <input type="number" step="0.01" name="defaultPrice" th:value="${nomenclature.defaultPrice}" required />
        </div>

        <div class="btn-group">
            <a th:href="@{/nomenclatures}" class="btn btn-secondary">Назад к каталогу</a>
            <button type="submit" class="btn btn-success">Сохранить изменения</button>
        </div>
    </form>
</div>

</body>
</html>
