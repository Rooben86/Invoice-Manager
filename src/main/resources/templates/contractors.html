<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Контрагенты - МойСчёт</title>
    <style>
        body { font-family: 'Segoe UI', Helvetica, Arial, sans-serif; background-color: #f2f5f8; margin: 0; padding: 0; color: #333; font-size: 13px; }
        .navbar-ms { background-color: #2c3e50; height: 45px; display: flex; align-items: center; padding: 0 20px; color: white; }
        .container-ms { background: white; margin: 20px auto; padding: 25px; border-radius: 4px; border: 1px solid #dcdfe6; max-width: 900px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
        h2 { margin-top: 0; margin-bottom: 20px; font-size: 18px; font-weight: 600; color: #1f2d3d; border-bottom: 1px solid #ebeef5; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background-color: #f5f7fa; padding: 10px 12px; font-weight: 600; color: #909399; border-bottom: 1px solid #e4e7ed; text-align: left; }
        td { padding: 10px 12px; border-bottom: 1px solid #ebeef5; vertical-align: middle; }
        .btn { padding: 6px 12px; border-radius: 3px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid #dcdfe6; text-decoration: none; display: inline-block; }
        .btn-primary { background-color: #007bff; color: white; border-color: #007bff; }
        .btn-secondary { background-color: #fff; color: #606266; }
    </style>
</head>
<body>

<div class="navbar-ms">
    <a th:href="@{/}" style="font-weight: bold; font-size: 15px; margin-right: 30px; letter-spacing: 0.5px; color: white; text-decoration: none;">МойСчёт</a>
    <a th:href="@{/}" style="color: #cbd5e0; text-decoration: none; padding: 0 15px;">Продажи</a>
    <div style="padding: 0 15px; font-weight: bold; border-bottom: 3px solid #007bff; height: 100%; display: flex; align-items: center; color: white;">Контрагенты</div>
    <a th:href="@{/nomenclatures}" style="color: #cbd5e0; text-decoration: none; padding: 0 15px;">Номенклатура</a>
</div>

<div class="container-ms">
    <h2>База Контрагентов (Покупателей)</h2>

    <table>
        <thead>
        <tr>
            <th style="width: 5%;">ID</th>
            <th style="width: 35%;">Наименование</th>
            <th style="width: 15%;">ИНН</th>
            <th style="width: 35%;">Юридический адрес</th>
            <th style="width: 10%;">Действие</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="c : ${contractors}">
            <td th:text="${c.id}" class="text-muted fw-bold"></td>
            <td><strong th:text="${c.name}"></strong></td>
            <td th:text="${c.taxNumber}"></td>
            <td th:text="${c.address}"></td>
            <td>
                <a th:href="@{/contractors/edit/{id}(id=${c.id})}" class="btn btn-secondary">Изменить</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
