<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Реквизиты организации - МойСклад</title>
    <style>
        body { font-family: 'Segoe UI', Helvetica, Arial, sans-serif; background-color: #f2f5f8; margin: 0; padding: 0; color: #333; font-size: 13px; }
        .navbar-ms { background-color: #2c3e50; height: 45px; display: flex; align-items: center; padding: 0 20px; color: white; }
        .form-container { background: white; margin: 20px auto; padding: 25px; border-radius: 4px; border: 1px solid #dcdfe6; max-width: 650px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
        h2 { margin-top: 0; margin-bottom: 20px; font-size: 18px; font-weight: 600; color: #1f2d3d; border-bottom: 1px solid #ebeef5; padding-bottom: 10px; }
        h3 { font-size: 14px; margin-top: 20px; margin-bottom: 10px; color: #007bff; border-bottom: 1px dashed #dee2e6; padding-bottom: 5px; }
        .form-row { display: flex; gap: 20px; margin-bottom: 15px; }
        .form-group { display: flex; flex-direction: column; width: 100%; }
        label { margin-bottom: 5px; font-weight: 500; color: #606266; }
        input { padding: 8px 12px; border: 1px solid #dcdfe6; border-radius: 3px; font-size: 13px; background: white; box-sizing: border-box; outline: none; }
        input:focus { border-color: #409eff; }
        .btn-group { margin-top: 25px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #ebeef5; padding-top: 15px; }
        .btn { padding: 8px 16px; border-radius: 3px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid #dcdfe6; text-decoration: none; display: inline-block; text-align: center; }
        .btn-success { background-color: #28a745; color: white; border-color: #28a745; }
        .btn-secondary { background-color: #fff; color: #606266; }
        .alert-success { background-color: #d4edda; color: #155724; padding: 12px; border-radius: 3px; margin-bottom: 20px; border: 1px solid #c3e6cb; font-weight: 500; }
    </style>
</head>
<body>

<div class="navbar-ms">
    <div style="font-weight: bold; font-size: 15px; margin-right: 30px; letter-spacing: 0.5px;">МойСчет</div>
    <a th:href="@{/}" style="padding: 0 15px; color: #cbd5e0; text-decoration: none;">Главная</a>
</div>

<div class="form-container">
    <h2>Реквизиты организации (Поставщика)</h2>
    <div class="alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>

    <form th:action="@{/organization/save}" method="POST" enctype="multipart/form-data">
        <input type="hidden" name="id" th:value="${org != null} ? ${org.id} : ''" />

        <h3>Основные сведения</h3>
        <div class="form-group" style="margin-bottom: 12px;">
            <label>Полное наименование организации:</label>
            <input type="text" name="name" th:value="${org != null} ? ${org.name} : ''" required />
        </div>
        <div class="form-row">
            <div class="form-group"><label>ИНН:</label><input type="text" name="taxNumber" th:value="${org != null} ? ${org.taxNumber} : ''" required /></div>
            <div class="form-group"><label>КПП:</label><input type="text" name="kpp" th:value="${org != null} ? ${org.kpp} : ''" required /></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>Юридический адрес:</label><input type="text" name="address" th:value="${org != null} ? ${org.address} : ''" required /></div>
            <div class="form-group"><label>Телефон компании:</label><input type="text" name="phone" th:value="${org != null} ? ${org.phone} : ''" required /></div>
        </div>

        <h3>Банковские реквизиты</h3>
        <div class="form-group" style="margin-bottom: 12px;">
            <label>Наименование Банка:</label>
            <input type="text" name="bankName" th:value="${org != null} ? ${org.bankName} : ''" required />
        </div>
        <div class="form-row">
            <div class="form-group" style="flex: 2;"><label>Расчетный счет (Сч. №):</label><input type="text" name="checkingAccount" th:value="${org != null} ? ${org.checkingAccount} : ''" required /></div>
            <div class="form-group" style="flex: 1;"><label>БИК Банка:</label><input type="text" name="bic" th:value="${org != null} ? ${org.bic} : ''" required /></div>
        </div>
        <div class="form-group" style="margin-bottom: 12px;">
            <label>Корреспондентский счет (Сч. № банка):</label>
            <input type="text" name="corrAccount" th:value="${org != null} ? ${org.corrAccount} : ''" required />
        </div>

        <h3>Подписи и Факсимиле</h3>
        <div class="form-row">
            <div class="form-group"><label>ФИО Руководителя:</label><input type="text" name="ceoName" th:value="${org != null} ? ${org.ceoName} : ''" required /></div>
            <div class="form-group"><label>ФИО Главного бухгалтера:</label><input type="text" name="cfoName" th:value="${org != null} ? ${org.cfoName} : ''" required /></div>
        </div>
        <div class="form-row" style="background: #f8fafc; padding: 10px; border-radius: 4px; border: 1px solid #e2e8f0;">
            <div class="form-group"><label>Загрузить файл Печати (.png):</label><input type="file" name="stampFile" accept="image/png" /></div>
            <div class="form-group"><label>Загрузить файл Подписи (.png):</label><input type="file" name="signatureFile" accept="image/png" /></div>
        </div>

        <div class="btn-group">
            <a th:href="@{/}" class="btn btn-secondary">На главную</a>
            <button type="submit" class="btn btn-success">Сохранить всё в базу</button>
        </div>
    </form>
</div>

</body>
</html>
