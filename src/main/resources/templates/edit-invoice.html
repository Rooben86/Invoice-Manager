<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Редактирование счета - МойСклад</title>
    <style>
        body { font-family: 'Segoe UI', Helvetica, Arial, sans-serif; background-color: #f2f5f8; margin: 0; padding: 0; color: #333; font-size: 13px; }
        .navbar-ms { background-color: #2c3e50; height: 45px; display: flex; align-items: center; padding: 0 20px; color: white; }
        .form-container { background: white; margin: 20px auto; padding: 25px; border-radius: 4px; border: 1px solid #dcdfe6; max-width: 1000px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
        h2 { margin-top: 0; margin-bottom: 20px; font-size: 20px; font-weight: 600; color: #1f2d3d; border-bottom: 1px solid #ebeef5; padding-bottom: 10px; }
        .form-row { display: flex; gap: 20px; margin-bottom: 15px; }
        .form-group { display: flex; flex-direction: column; position: relative; width: 100%; }
        label { margin-bottom: 5px; font-weight: 500; color: #606266; }
        input, select, textarea { padding: 8px 12px; border: 1px solid #dcdfe6; border-radius: 3px; font-size: 13px; background: white; box-sizing: border-box; outline: none; }
        input:focus, select:focus, textarea:focus { border-color: #409eff; }
        .dropdown-options { display: none; position: absolute; top: 100%; left: 0; right: 0; background: white; border: 1px solid #dcdfe6; max-height: 180px; overflow-y: auto; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-radius: 3px; }
        .dropdown-options div { padding: 8px 12px; cursor: pointer; color: #606266; }
        .dropdown-options div:hover { background-color: #f5f7fa; color: #409eff; }
        .dropdown-options .quick-add-opt { font-weight: bold; color: #007bff; border-top: 1px solid #ebeef5; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; text-align: left; }
        th { background-color: #f5f7fa; padding: 10px 12px; font-weight: 600; color: #909399; border-bottom: 1px solid #e4e7ed; font-size: 12px; }
        td { padding: 8px 12px; border-bottom: 1px solid #ebeef5; vertical-align: middle; }
        .totals-box { margin-top: 20px; background: #f8fafc; padding: 15px; border-radius: 4px; text-align: right; font-size: 15px; border: 1px solid #e2e8f0; }
        .btn-group { margin-top: 25px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #ebeef5; padding-top: 15px; }
        .btn { padding: 8px 16px; border-radius: 3px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid #dcdfe6; text-decoration: none; display: inline-block; text-align: center; }
        .btn-success { background-color: #28a745; color: white; border-color: #28a745; }
        .btn-secondary { background-color: #fff; color: #606266; }
        .btn-secondary:hover { background: #f5f7fa; }
        .btn-primary { background-color: #007bff; color: white; border-color: #007bff; }
        .btn-danger { background-color: #dc3545; color: white; border-color: #dc3545; }
        .alert-success { background-color: #d4edda; color: #155724; padding: 12px; border-radius: 3px; margin-bottom: 20px; border: 1px solid #c3e6cb; font-weight: 500; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 5000; justify-content: center; align-items: center; }
        .modal-box { background: white; padding: 25px; border-radius: 4px; width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); border: 1px solid #dcdfe6; }
    </style>
</head>
<body>

<div class="navbar-ms">
    <div style="font-weight: bold; font-size: 15px; margin-right: 30px; letter-spacing: 0.5px;">МойСчет</div>
    <div style="padding: 0 15px; opacity: 0.7;">Главная</div>
    <div style="padding: 0 15px; font-weight: bold; border-bottom: 3px solid #007bff; height: 100%; display: flex; align-items: center;">Продажи</div>
    <div style="padding: 0 15px; opacity: 0.7;">Контрагенты</div>
    <div style="padding: 0 15px; opacity: 0.7;">Номенклатура</div>
</div>

<div class="form-container">
    <h2>Редактирование счета № <span th:text="${invoice.invoiceNumber}"></span></h2>

    <div class="alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>

    <form th:action="@{/invoice/update-saved}" method="POST" id="invoiceForm">
        <input type="hidden" name="invoiceId" th:value="${invoice.id}" />

        <div class="form-row">
            <div class="form-group" style="flex: 1;">
                <label>Номер счета:</label>
                <input type="text" name="invoiceNumber" th:value="${invoice.invoiceNumber}" required />
            </div>
            <div class="form-group" style="flex: 1;">
                <label>Дата счета:</label>
                <input type="date" id="issueDate" name="issueDate" th:value="${#temporals.format(invoice.issueDate, 'yyyy-MM-dd')}" required />
            </div>
        </div>

        <div class="form-row">
            <div class="form-group" style="flex: 1;">
                <label>Организация (Поставщик):</label>
                <select name="organizationId" required style="width: 100%;">
                    <option th:each="o : ${organizations}" th:value="${o.id}" th:text="${o.name}" th:selected="${o.id == invoice.organization.id}"></option>
                </select>
            </div>
            <div class="form-group" style="flex: 1;">
                <label>Контрагент (Покупатель):</label>
                <input type="text" id="contractorSearch" th:value="${invoice.contractor.name}" autocomplete="off" required style="width: 100%;" />
                <input type="hidden" name="contractorId" id="hiddenContractorId" th:value="${invoice.contractor.id}" required />
                <div class="dropdown-options" id="contractorDropdown"></div>
            </div>
        </div>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 30px; margin-bottom: 10px;">
            <h3 style="font-size: 15px; font-weight: 600; margin: 0; color: #1f2d3d;">Товарные позиции</h3>
            <button type="button" class="btn btn-secondary" style="color: #007bff; border-color: #007bff;" onclick="addNewRow()">+ Добавить позицию</button>
        </div>

        <table id="itemsTable">
            <thead>
            <tr>
                <th style="width: 5%;">#</th>
                <th style="width: 50%;">Товар / Услуга</th>
                <th style="width: 15%;">Количество</th>
                <th style="width: 20%;">Цена с НДС 22%</th>
                <th style="width: 10%;">Удалить</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${invoice.items}">
                <td class="row-number" style="vertical-align: middle; font-weight: bold; color: #909399;"></td>
                <td>
                    <div style="position: relative;">
                        <input type="text" class="row-search" th:value="${item.nomenclature.name}" placeholder="Начните вводить название товара..." autocomplete="off" required style="width:100%;" />
                        <input type="hidden" name="nomenclatureIds" th:value="${item.nomenclature.id}" />
                        <div class="dropdown-options nominal-drop"></div>
                    </div>
                </td>
                <td><input type="number" step="0.01" name="quantities" th:value="${item.quantity}" class="form-control" required style="width:100%;" oninput="calculateLiveTotals()" /></td>
                <td><input type="number" step="0.01" name="prices" th:value="${item.price}" class="form-control" required style="width:100%;" oninput="calculateLiveTotals()" /></td>
                <td><button type="button" class="btn btn-danger" onclick="removeRow(this)">X</button></td>
            </tr>
            </tbody>
        </table>

        <div class="totals-box">
            <div><strong>Итого к оплате (с НДС):</strong> <span id="liveGrandTotal">0.00 руб.</span></div>
            <div style="font-size: 12px; color: #909399; margin-top: 5px;">В том числе НДС (22%): <span id="liveVatTotal">0.00 руб.</span></div>
        </div>

        <div class="form-group" style="margin-top: 20px;">
            <label>Комментарий к счету:</label>
            <textarea name="commentary" rows="3" placeholder="Введите внутреннее примечание к счету..." th:text="${invoice.status}"></textarea>
        </div>

        <div class="btn-group">
            <a th:href="@{/}" class="btn btn-secondary">Закрыть</a>
            <div>
                <a th:href="@{/invoice/export/excel/{id}(id=${invoice.id})}" class="btn" style="background-color: #28a745; color: white; border-color: #28a745;">Скачать Excel</a>
                <a th:href="@{/invoice/export/pdf/{id}(id=${invoice.id})}" class="btn" style="background-color: #dc3545; color: white; border-color: #dc3545;">Скачать PDF</a>
                <button type="submit" class="btn btn-primary" style="margin-left: 10px;">Сохранить изменения</button>
            </div>
        </div>
    </form>
</div>

<div id="contractorModal" class="modal-overlay">
    <div class="modal-box">
        <h3 style="margin-top: 0; margin-bottom: 15px; font-size: 16px;">Новый Контрагент</h3>
        <div class="form-group">
            <label>Наименование контрагента:</label>
            <input type="text" id="modalContrName" style="width:100%;" />
        </div>
        <div class="form-group" style="margin-top: 10px;">
            <label>ИНН контрагента:</label>
            <input type="text" id="modalContrTax" placeholder="Например: 7810234567" style="width:100%;" />
        </div>
        <div style="margin-top: 20px; display: flex; justify-content: space-between;">
            <button type="button" class="btn btn-secondary" onclick="closeModal('contractorModal')">Отмена</button>
            <button type="button" class="btn btn-success" onclick="submitQuickContractor()">Создать</button>
        </div>
    </div>
</div>

<div id="nomenclatureModal" class="modal-overlay">
    <div class="modal-box">
        <h3 style="margin-top: 0; margin-bottom: 15px; font-size: 16px;">Новая позиция каталога</h3>
        <div class="form-group">
            <label>Наименование товара / услуги:</label>
            <input type="text" id="modalNomName" style="width:100%;" />
        </div>
        <div class="form-group" style="margin-top: 10px;">
            <label>Единица измерения:</label>
            <select id="modalNomUnit" style="width:100%;" onchange="toggleCustomUnit(this)">
                <option value="шт">шт (Штука)</option>
                <option value="куб.м">куб.м (Кубический метр)</option>
                <option value="лист">лист (Лист)</option>
                <option value="кг">кг (Килограмм)</option>
                <option value="CUSTOM">+ Другая ед. изм...</option>
            </select>
        </div>
        <div class="form-group" id="customUnitWrapper" style="margin-top: 10px; display: none;">
            <label>Введите свою единицу измерения:</label>
            <input type="text" id="modalCustomUnit" placeholder="Например: уп" style="width:100%;" />
        </div>
        <div style="margin-top: 20px; display: flex; justify-content: space-between;">
            <button type="button" class="btn btn-secondary" onclick="closeModal('nomenclatureModal')">Отмена</button>
            <button type="button" class="btn btn-success" onclick="submitQuickNomenclature()">Внести в базу</button>
        </div>
    </div>
</div>
<script th:inline="javascript">
    let contractors = [[${contractors}]];
    let nomenclatureList = [[${nomenclatures}]];
    let activeNomTargetInput = null;

    window.addEventListener('DOMContentLoaded', () => {
        reindexRows();
        calculateLiveTotals();
        initContractorSearch();
        bindNomenclatureEvents();
    });

    function reindexRows() {
        const rows = document.querySelectorAll("#itemsTable tbody tr");
        rows.forEach((row, index) => {
            row.querySelector(".row-number").innerText = index + 1;
        });
    }

    function calculateLiveTotals() {
        let grandTotal = 0;
        const rows = document.querySelectorAll("#itemsTable tbody tr");
        rows.forEach(row => {
            const qty = parseFloat(row.querySelector("input[name='quantities']").value) || 0;
            const price = parseFloat(row.querySelector("input[name='prices']").value) || 0;
            grandTotal += (qty * price);
        });
        let vatTotal = grandTotal * 22 / 122;
        document.getElementById("liveGrandTotal").innerText = grandTotal.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, " ") + " руб.";
        document.getElementById("liveVatTotal").innerText = vatTotal.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, " ") + " руб.";
    }

    function addNewRow() {
        const tbody = document.querySelector("#itemsTable tbody");
        const row = document.createElement("tr");
        row.innerHTML = `
      <td class="row-number" style="vertical-align: middle; font-weight: bold; color: #909399;"></td>
      <td>
        <div style="position: relative;">
          <input type="text" class="row-search" placeholder="Начните вводить название товара..." autocomplete="off" required style="width:100%;" />
          <input type="hidden" name="nomenclatureIds" />
          <div class="dropdown-options rounded nominal-drop"></div>
        </div>
      </td>
      <td><input type="number" step="0.01" name="quantities" value="1.00" class="form-control" required style="width:100%;" oninput="calculateLiveTotals()" /></td>
      <td><input type="number" step="0.01" name="prices" value="0.00" class="form-control" required style="width:100%;" oninput="calculateLiveTotals()" /></td>
      <td><button type="button" class="btn btn-danger" onclick="removeRow(this)">X</button></td>
    `;
        tbody.appendChild(row);
        reindexRows();
        bindNomenclatureEvents();
    }

    function removeRow(btn) {
        const rows = document.querySelectorAll("#itemsTable tbody tr");
        if (rows.length > 1) {
            btn.closest("tr").remove();
            reindexRows();
            calculateLiveTotals();
        }
    }

    function initContractorSearch() {
        const input = document.getElementById("contractorSearch");
        const dropdown = document.getElementById("contractorDropdown");
        input.addEventListener("input", () => {
            const val = input.value.toLowerCase(); dropdown.innerHTML = "";
            let matches = contractors.filter(c => c.name.toLowerCase().includes(val));
            matches.forEach(c => {
                const div = document.createElement("div"); div.innerText = c.name;
                div.onclick = () => { input.value = c.name; document.getElementById("hiddenContractorId").value = c.id; dropdown.style.display = "none"; };
                dropdown.appendChild(div);
            });
            if (val.trim() !== "") {
                const addDiv = document.createElement("div"); addDiv.className = "quick-add-opt";
                addDiv.innerText = `+ Добавить нового контрагента: "${input.value}"`;
                addDiv.onclick = () => { document.getElementById("modalContrName").value = input.value; document.getElementById("contractorModal").style.display = "flex"; dropdown.style.display = "none"; };
                dropdown.appendChild(addDiv);
            }
            dropdown.style.display = dropdown.children.length ? "block" : "none";
        });
        document.addEventListener("click", (e) => { if (e.target !== input) dropdown.style.display = "none"; });
    }

    function bindNomenclatureEvents() {
        document.querySelectorAll(".row-search").forEach(input => {
            if (input.dataset.bound) return; input.dataset.bound = "true";
            const dropdown = input.nextElementSibling.nextElementSibling;
            input.addEventListener("input", () => {
                const val = input.value.toLowerCase(); dropdown.innerHTML = "";
                let matches = nomenclatureList.filter(n => n.name.toLowerCase().includes(val));
                matches.forEach(n => {
                    const div = document.createElement("div"); div.innerText = `${n.name} (${n.unit})`;
                    div.onclick = () => { input.value = n.name; input.nextElementSibling.value = n.id; input.closest("tr").querySelector("input[name='prices']").value = n.defaultPrice.toFixed(2); dropdown.style.display = "none"; calculateLiveTotals(); };
                    dropdown.appendChild(div);
                });
                if (val.trim() !== "") {
                    const addDiv = document.createElement("div"); addDiv.className = "quick-add-opt";
                    addDiv.innerText = `+ Создать новую номенклатуру: "${input.value}"`;
                    addDiv.onclick = () => { activeNomTargetInput = input; document.getElementById("modalNomName").value = input.value; document.getElementById("nomenclatureModal").style.display = "flex"; dropdown.style.display = "none"; };
                    dropdown.appendChild(addDiv);
                }
                dropdown.style.display = dropdown.children.length ? "block" : "none";
            });
        });
    }

    document.addEventListener("click", (e) => { if (!e.target.classList.contains("row-search")) document.querySelectorAll(".nominal-drop").forEach(d => d.style.display = "none"); });
    function toggleCustomUnit(s) { document.getElementById("customUnitWrapper").style.display = s.value === "CUSTOM" ? "block" : "none"; }
    function closeModal(id) { document.getElementById(id).style.display = "none"; }

    function submitQuickContractor() {
        const name = document.getElementById("modalContrName").value;
        const tax = document.getElementById("modalContrTax").value || "—";
        if(!name) return;
        fetch('/contractors/quick-add', {
            method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams({ 'name': name, 'taxNumber': tax })
        }).then(res => res.json()).then(data => {
            if(data.status === 'success') {
                contractors.push({ id: data.id, name: data.name });
                document.getElementById("contractorSearch").value = data.name;
                document.getElementById("hiddenContractorId").value = data.id;
                closeModal('contractorModal');
            }
        });
    }

    function submitQuickNomenclature() {
        const name = document.getElementById("modalNomName").value;
        const select = document.getElementById("modalNomUnit");
        let unit = select.value === "CUSTOM" ? document.getElementById("modalCustomUnit").value : select.value;
        if(!name || !unit) return;
        fetch('/nomenclatures/quick-add', {
            method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams({ 'name': name, 'unit': unit })
        }).then(res => res.json()).then(data => {
            if(data.status === 'success') {
                nomenclatureList.push({ id: data.id, name: data.name, unit: data.unit, defaultPrice: 0.00 });
                if (activeNomTargetInput) { activeNomTargetInput.value = data.name; activeNomTargetInput.nextElementSibling.value = data.id; activeNomTargetInput.closest("tr").querySelector("input[name='prices']").value = "0.00"; }
                closeModal('nomenclatureModal'); select.value = "шт"; document.getElementById("customUnitWrapper").style.display = "none"; document.getElementById("modalCustomUnit").value = ""; calculateLiveTotals();
            }
        });
    }
</script>
</body>
</html>
